name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/it-park-capital/itparkcapital.uz
  CONTAINER: itparkcapital-uz

jobs:
  build-and-test:
    name: Build & Test
    runs-on: [self-hosted, linux, x64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  build-push:
    name: Build & Push Image
    runs-on: [self-hosted, linux, x64]
    needs: build-and-test
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Lowercase image name
        run: echo "IMAGE=${IMAGE,,}" >> $GITHUB_ENV

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:latest
          cache-to: type=inline

  deploy:
    name: Deploy
    runs-on: [self-hosted, linux, x64]
    needs: build-push
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: read

    steps:
      - name: Lowercase image name
        run: echo "IMAGE=${IMAGE,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: docker pull ${{ env.IMAGE }}:latest

      - name: Restart container
        run: |
          docker stop ${{ env.CONTAINER }} || true
          docker rm   ${{ env.CONTAINER }} || true
          docker run -d \
            --name ${{ env.CONTAINER }} \
            --restart unless-stopped \
            -p 3001:80 \
            ${{ env.IMAGE }}:latest
          docker image prune -f
