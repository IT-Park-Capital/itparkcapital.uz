<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131a28"/>
      <stop offset="100%" stop-color="#040e1e"/>
    </linearGradient>
    <radialGradient id="glow" cx="85%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#85bc32" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#85bc32" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Logo mark -->
  <rect x="80" y="80" width="64" height="64" rx="14" fill="#040e1e" stroke="#85bc32" stroke-width="1.5"/>
  <rect x="96" y="100" width="8" height="28" fill="#85bc32"/>
  <path d="M108 100h8l8 12-8 12h-8l8-12z" fill="#fff"/>
  <circle cx="132" cy="96" r="6" fill="#85bc32"/>

  <text x="160" y="115" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" fill="#fff" letter-spacing="-0.5">IT Park Capital</text>
  <text x="160" y="138" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="500" fill="#85bc32" letter-spacing="2">FINANCIAL INSTITUTE</text>

  <!-- Hero text -->
  <text x="80" y="320" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="600" fill="#fff" letter-spacing="-2">Financing the digital</text>
  <text x="80" y="395" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="600" fill="#a3acbc" letter-spacing="-2">future of Uzbekistan</text>

  <!-- Pills -->
  <g transform="translate(80, 460)">
    <rect width="140" height="44" rx="22" fill="#85bc32"/>
    <text x="70" y="29" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#040e1e" text-anchor="middle">Targeted loans</text>
  </g>
  <g transform="translate(232, 460)">
    <rect width="120" height="44" rx="22" fill="none" stroke="#5a6778" stroke-width="1.5"/>
    <text x="60" y="29" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#fff" text-anchor="middle">Zero Risk</text>
  </g>
  <g transform="translate(364, 460)">
    <rect width="100" height="44" rx="22" fill="none" stroke="#5a6778" stroke-width="1.5"/>
    <text x="50" y="29" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="500" fill="#fff" text-anchor="middle">M&amp;A</text>
  </g>

  <!-- Right card -->
  <g transform="translate(840, 200)">
    <rect width="280" height="280" rx="20" fill="url(#glow)"/>
    <rect width="280" height="280" rx="20" fill="none" stroke="#85bc32" stroke-opacity="0.25" stroke-width="1.5"/>
    <text x="32" y="60" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600" fill="#85bc32" letter-spacing="2">RESULTS</text>
    <text x="32" y="130" font-family="Inter, system-ui, sans-serif" font-size="56" font-weight="600" fill="#fff" letter-spacing="-1.5">$29M+</text>
    <text x="32" y="160" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#a3acbc">annual export</text>

    <line x1="32" y1="190" x2="248" y2="190" stroke="#2a3140" stroke-width="1"/>

    <text x="32" y="225" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="600" fill="#fff" letter-spacing="-1">1 500+</text>
    <text x="32" y="248" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#a3acbc">jobs created</text>
  </g>

  <!-- URL -->
  <text x="80" y="570" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#5a6778" letter-spacing="0.5">itparkcapital.uz</text>
</svg>
